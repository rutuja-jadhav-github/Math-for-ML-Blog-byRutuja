---
layout: default
title: Blog
---

<main class="content">

  <h1>Posts</h1>

  <div class="posts-list">

    {% for post in site.posts %}

      <div class="post-item">

        <h3>
            <a href="{{ site.baseurl }}{{ post.url }}">
                {{ post.title }}
            </a>
        </h3>

        <p>
          {{ post.date | date: "%B %-d, %Y" }}
        </p>

      </div>

    {% endfor %}

  </div>

</main>
